<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.ico">
    <title>Layout e-commerce CSS Grid</title>
</head>
<body>
    <nav class="navbar">
        <h1>Singularity Shop</h1>
    </nav>
    <aside class="lateral">
        <h2>Categorías</h2>
        <div class="tipos">
            <div class="cat">
            <h4>Transmisores de Datos</h4>
            <p>(13)</p>
        </div>
        <div class="cat">
            <h4>Unidades de Propulsión</h4>
            <p>(21)</p>
        </div>
        <div class="cat">
            <h4>Disruptores de señal</h4>
            <p>(41)</p>
        </div>
        <div class="cat">
            <h4>Mercancía Improbable</h4>
            <p>(10)</p>
        </div>
        </div>
    </aside>
    <main class="contenido">
        <figure class="card">
            <img src="./assets/img/pro1.webp" alt="AuraBand X1">
            <div class="descripción">
                <h3>AuraBand X1</h3>
                <figcaption>Redefine tu conexión con el entorno. Una pulsera inteligente de diseño aerodinámico con pantalla holográfica profunda y monitorización biométrica avanzada en tiempo real. Elegancia cuántica en tu muñeca.</figcaption>
            </div>
            <div class="comprar">
                <p>$139.990</p>
                <button>Añadir al carrito</button>
            </div>
        </figure>
        <figure class="card">
            <img src="./assets/img/pro2.webp" alt="Orbit-V Nexus Drone">
            <div class="descripción">
                <h3>Orbit-V Nexus Drone</h3>
                <figcaption>El futuro de la vigilancia y la captura aérea. Equipado con propulsión magnética ultra-silenciosa, lente de aproximación focal inteligente y un chasis aerodinámico blindado para interiores y exteriores.</figcaption>
            </div>
            <div class="comprar">
                <p>$279.990</p>
                <button>Añadir al carrito</button>
            </div>
        </figure>
        <figure class="card">
            <img src="./assets/img/pro3.webp" alt="HydroVortex Pure">
            <div class="descripción">
                <h3>HydroVortex Pure</h3>
                <figcaption>Agua pura en movimiento constante. Sistema de purificación molecular por vórtex que optimiza la oxigenación del agua. Diseño ergonómico con iluminación LED indicadora de pureza activa.</figcaption>
            </div>
            <div class="comprar">
                <p>$69.990</p>
                <button>Añadir al carrito</button>
            </div>
        </figure>
        <figure class="card">
            <img src="./assets/img/pro4.webp" alt="BioSphere EcoPod">
            <div class="descripción">
                <h3>BioSphere EcoPod</h3>
                <figcaption>Cultiva el futuro en tu hogar. Un ecosistema autónomo y cerrado con simulación de luz solar de espectro completo y control climático automatizado para el crecimiento perfecto de tus plantas.</figcaption>
            </div>
            <div class="comprar">
                <p>$189.990</p>
                <button>Añadir al carrito</button>
            </div>
        </figure>
        <figure class="card">
            <img src="./assets/img/pro5.webp" alt="Dermashield Pro">
            <div class="descripción">
                <h3>Dermashield Pro</h3>
                <figcaption>Tecnología clínica en la palma de tu mano. Dispositivo ergonómico de fototerapia y estimulación sónica para la regeneración celular. Cuenta con interfaz táctil inteligente y base auto-limpiable.</figcaption>
            </div>
            <div class="comprar">
                <p>$49.990</p>
                <button>Añadir al carrito</button>
            </div>
        </figure>
    </main>
    <footer class="pie">
        <div class="pie-contenido">
            <p>Punto de Contacto</p>
            <p>Registro de Anomalías</p>
            <p>Derechos del Explorador</p>
        </div>
        <h3>©2026. Singularity Shop</h3>
    </footer>
</body>
</html>
